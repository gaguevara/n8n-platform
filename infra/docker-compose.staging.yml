version: "3.8"

services:
  n8n:
    image: registry.local:5000/delcop/n8n:${TAG:-latest}
    container_name: n8n_staging
    ports:
      - "5678:5678"
    env_file:
      - ../.env
    environment:
      N8N_SECURE_COOKIE: "true"
      N8N_PROTOCOL: http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data: {}
