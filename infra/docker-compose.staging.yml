services:
  n8n:
    image: ${ECR_REGISTRY:-n8nio/n8n}:${TAG:-latest}
    container_name: n8n_staging
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - path: ../.env
        required: false
    environment:
      - N8N_SECURE_COOKIE=true
      - N8N_PROTOCOL=http
      # En staging, el reverse proxy maneja HTTPS
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://staging.delcop.com:5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://staging.delcop.com:5678/}
      # --- Threat Intelligence DB ---
      - THREAT_DB_HOST=threat-db
      - THREAT_DB_PORT=5432
      - THREAT_DB_NAME=threat_intel
      - THREAT_DB_USER=${THREAT_DB_USER:-delcop_threat}
      - THREAT_DB_PASSWORD=${THREAT_DB_PASSWORD}
      # --- Threat Intelligence Cache ---
      - REDIS_HOST=threat-cache
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/files
    restart: unless-stopped
    depends_on:
      threat-db:
        condition: service_healthy
      threat-cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - n8n-net

  threat-db:
    image: postgres:16-alpine
    container_name: n8n_threat_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${THREAT_DB_USER:-delcop_threat}
      - POSTGRES_PASSWORD=${THREAT_DB_PASSWORD}
      - POSTGRES_DB=threat_intel
      - POSTGRES_MULTIPLE_DATABASES=threat_intel
    volumes:
      - threat_db_data:/var/lib/postgresql/data
      - ./init-db/00-create-dbs.sh:/docker-entrypoint-initdb.d/00-create-dbs.sh:ro
      - ./init-db/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init-db/seed_reference_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THREAT_DB_USER:-delcop_threat} -d threat_intel"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  threat-cache:
    image: redis:7-alpine
    container_name: n8n_threat_cache
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - threat_cache_data:/data
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
    name: n8n_staging_data
  n8n_files:
    name: n8n_staging_files
  threat_db_data:
    name: n8n_staging_threat_db
  threat_cache_data:
    name: n8n_staging_threat_cache

networks:
  n8n-net:
    driver: bridge
