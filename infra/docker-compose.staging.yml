services:
  n8n:
    image: ${ECR_REGISTRY:-n8nio/n8n}:${TAG:-latest}
    container_name: n8n_staging
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - path: ../.env
        required: false
    environment:
      - N8N_SECURE_COOKIE=true
      - N8N_PROTOCOL=http
      # En staging, el reverse proxy maneja HTTPS
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://staging.delcop.com:5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://staging.delcop.com:5678/}
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/files
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
    name: n8n_staging_data
  n8n_files:
    name: n8n_staging_files
