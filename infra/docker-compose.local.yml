version: "3.8"

services:
  n8n:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: n8n_local
    ports:
      - "5678:5678"
    env_file:
      - ../.env
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_PROTOCOL: http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  n8n_data: {}
