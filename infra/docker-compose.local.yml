name: n8n
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_local
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - ../.env
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
    volumes:
      - ../data:/home/node/.n8n
      - ../shared-files:/files
    restart: unless-stopped